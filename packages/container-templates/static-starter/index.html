<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deployed on CLI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            color: #ededed;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .card {
            padding: 3rem;
            border-radius: 12px;
            border: 1px solid #1a1a2e;
            background: #111118;
            text-align: center;
            max-width: 500px;
        }
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        h1 span { color: #6c63ff; }
        p { color: #888; font-size: 1.1rem; margin-bottom: 2rem; }
        a.cta {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: #6c63ff;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Deployed on <span>CLI</span></h1>
        <p>Your static site is live. Prove the platform works in 60 seconds.</p>
        <a class="cta" href="https://docs.cli.cloud">Read Docs</a>
    </div>
</body>
</html>
